name: Test Report

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

jobs:
  report:
    name: Workflow-Run Test
    runs-on: [cloud, linux]
    steps:
    - uses: actions/checkout@v2
    - uses: ./
      with:
        artifact: test-results
        name: Workflow-Run Artifact
        path: '*.xml'
        reporter: jest-junit
